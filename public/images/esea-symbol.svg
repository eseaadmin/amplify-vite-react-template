<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">

  <!-- 지구본 배경 원 -->
  <circle cx="36" cy="36" r="34" fill="#1565c0"/>

  <!-- 경선 -->
  <ellipse cx="36" cy="36" rx="34" ry="34" fill="none" stroke="white" stroke-width="0.9" opacity="0.15"/>
  <ellipse cx="36" cy="36" rx="18" ry="34" fill="none" stroke="white" stroke-width="0.9" opacity="0.45"/>
  <ellipse cx="36" cy="36" rx="6"  ry="34" fill="none" stroke="white" stroke-width="0.9" opacity="0.3"/>
  <!-- 위선 -->
  <line x1="2" y1="36" x2="70" y2="36" stroke="white" stroke-width="0.9" opacity="0.5"/>
  <ellipse cx="36" cy="36" rx="34" ry="13" fill="none" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <ellipse cx="36" cy="36" rx="32" ry="24" fill="none" stroke="white" stroke-width="0.7" opacity="0.25"/>

  <!-- 외곽 테두리 -->
  <circle cx="36" cy="36" r="34" fill="none" stroke="#0d47a1" stroke-width="1.2"/>

  <!-- 연두 막대 (좌하단) -->
  <rect x="0" y="0" width="22" height="7" rx="3.5" fill="#7cb342"
        transform="translate(7,56) rotate(-38)"/>

  <!-- 노란 막대 1 (우상단) -->
  <rect x="0" y="0" width="18" height="7" rx="3.5" fill="#f9a825"
        transform="translate(50,9) rotate(-38)"/>

  <!-- 노란 막대 2 (우중단) -->
  <rect x="0" y="0" width="22" height="7" rx="3.5" fill="#f9a825"
        transform="translate(56,23) rotate(-38)"/>

</svg>
