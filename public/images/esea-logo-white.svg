<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" width="340" height="72">

  <!-- 지구본 배경 원 (밝은 파란색 – 흰 배경 대비용) -->
  <circle cx="36" cy="36" r="30" fill="#4da6ff"/>

  <!-- 지구본 내부 경선·위선 (흰색) -->
  <ellipse cx="36" cy="36" rx="30" ry="30" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="36" cy="36" rx="16" ry="30" fill="none" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="36" cy="36" rx="5"  ry="30" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="6"  y1="36" x2="66" y2="36" stroke="white" stroke-width="0.8" opacity="0.55"/>
  <ellipse cx="36" cy="36" rx="30" ry="11" fill="none" stroke="white" stroke-width="0.8" opacity="0.45"/>
  <ellipse cx="36" cy="36" rx="28" ry="21" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>

  <!-- 지구본 외곽 테두리 -->
  <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- 연두색 막대 -->
  <rect x="0" y="0" width="20" height="6.5" rx="3.25" fill="#a5d86a"
        transform="translate(8,52) rotate(-38)"/>

  <!-- 노란색 막대 1 -->
  <rect x="0" y="0" width="17" height="6.5" rx="3.25" fill="#ffd54f"
        transform="translate(48,10) rotate(-38)"/>

  <!-- 노란색 막대 2 -->
  <rect x="0" y="0" width="20" height="6.5" rx="3.25" fill="#ffd54f"
        transform="translate(54,23) rotate(-38)"/>

  <!-- '사단법인' – 흰색 -->
  <text x="82" y="20"
        font-family="'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-size="11.5"
        fill="rgba(255,255,255,0.7)"
        font-weight="500"
        letter-spacing="1">사단법인</text>

  <!-- '에너지안보환경협회' – 흰색 bold -->
  <text x="82" y="44"
        font-family="'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-size="20"
        fill="#ffffff"
        font-weight="700"
        letter-spacing="-0.5">에너지안보환경협회</text>

  <!-- 영문명 – 흰색 반투명 -->
  <text x="82" y="60"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="9.2"
        fill="rgba(255,255,255,0.6)"
        font-weight="400"
        letter-spacing="0.15">Energy, Security and Environment Association</text>

</svg>
